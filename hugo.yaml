baseURL: "/"
title: Tech logs
pagination:
  pagerSize: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  # mainSections: ["posts"]

  env: production
  description: "A simple learning log"
  author: Eshan

  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true

  homeInfoParams:
    Title: "Coding, Breaking, Exploring"
    Content: "A 21 year old’s attempt to learn coding from building and breaking things."

  # socialIcons:
  # - name: github
  #   url: "https://github.com/"
  # - name: twitter
  #   url: "https://twitter.com/"
  # - name: email
  #   url: "mailto:you@example.com"

  cover:
    linkFullImages: true
    responsiveImages: true

  # editPost:
  #   URL: "https://github.com/yourusername/blog/tree/main/content"
  #   Text: "Suggest Changes"
  #   appendFilePath: true

menu:
  main:
    - name: Home
      url: /
      weight: 5
    - name: About
      url: /about/
      weight: 10
